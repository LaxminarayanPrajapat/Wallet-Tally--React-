name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build
      env:
        GEMINI_API_KEY: placeholder
        GOOGLE_GENAI_API_KEY: placeholder
        SMTP_HOST: smtp.gmail.com
        SMTP_PORT: 465
        SMTP_USER: placeholder@gmail.com
        SMTP_PASS: placeholder
        SMTP_FROM: "Wallet Tally <placeholder@gmail.com>"
