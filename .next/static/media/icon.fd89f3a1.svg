
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 32 32"
  fill="none"
>
  <defs>
    <linearGradient id="icon-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#1e3a8a" />
      <stop offset="100%" stopColor="#064e3b" />
    </linearGradient>
  </defs>
  
  <!-- Main Wallet Body -->
  <rect 
    x="2" 
    y="6" 
    width="28" 
    height="20" 
    rx="4" 
    fill="url(#icon-gradient)" 
    stroke="white"
    strokeWidth="1.5"
  />

  <!-- Top Stitch Line -->
  <path 
    d="M2 12H30" 
    stroke="white" 
    strokeWidth="0.5" 
    strokeOpacity="0.4" 
    strokeDasharray="2 1"
  />

  <!-- Wrap-around Flap -->
  <rect 
    x="18" 
    y="11" 
    width="14" 
    height="10" 
    rx="3" 
    fill="url(#icon-gradient)" 
    stroke="white"
    strokeWidth="1.5"
  />

  <!-- Clasp Button -->
  <circle 
    cx="27" 
    cy="16" 
    r="2.5" 
    fill="white" 
  />
  <circle 
    cx="27" 
    cy="16" 
    r="1" 
    fill="url(#icon-gradient)" 
    stroke="white"
    strokeWidth="0.2"
  />
</svg>
